# Convergence study: 20+ NightmareNet cycles on SST-2
# Run analysis (calibrate from existing GPU benchmark, or live GPU runs):
#   python scripts/convergence_analysis.py --calibrate
#   python scripts/convergence_analysis.py --run --device cuda
#   python scripts/convergence_analysis.py --analyze
#
# Live runs use this config as the base; --model overrides model.name.

model:
  name: distilbert-base-uncased
  type: seq_classification
  max_length: 128
  num_labels: 2

dataset:
  name: glue
  config: sst2
  text_column: sentence
  label_column: label
  max_samples: 500

training:
  wake_epochs: 1
  dream_epochs: 0
  nightmare_epochs: 1
  compress_epochs: 0
  num_cycles: 20
  auto_terminate: false
  convergence_threshold: 0.005
  convergence_patience: 2
  batch_size: 8
  learning_rate: 3.0e-5
  device: cuda
  mixed_precision: fp16
  gradient_checkpointing: true
  checkpoint_dir: checkpoints/convergence
  log_dir: logs/convergence

distortion:
  dream_strength: 0.25
  nightmare_strength: 0.5

compression:
  pruning_ratio: 0.0

evaluation:
  strengths: [0.1, 0.3, 0.5, 0.7, 0.9]
  seed: 42

tracking:
  enabled: false

seed: 42

# Study metadata consumed by scripts/convergence_analysis.py
convergence_study:
  models:
    - distilbert-base-uncased
    - prajjwal1/bert-tiny
  train_samples: 500
  eval_samples: 200
  target_fraction: 0.95
  output_dir: results/convergence
